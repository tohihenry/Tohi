<head>

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        /* Silver frost breathe - visible against white */
        @keyframes breathe {
            0%, 100% { 
                background: rgba(0, 0, 0, 0);
                box-shadow: 0 0 0px rgba(0, 0, 0, 0);
            }
            50% { 
                background: rgba(50, 70, 110, 0.14);
                box-shadow: 0 0 25px rgba(70, 90, 130, 0.22), 0 0 50px rgba(70, 90, 130, 0.08);
            }
        }

        /* Shimmer sweep - visible light pass */
        @keyframes shimmer {
            0% { left: -100%; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { left: 150%; opacity: 0; }
        }

        /* Hover - stronger frost */
        @keyframes hoverGlow {
            0%, 100% { 
                background: rgba(50, 70, 110, 0.16);
                box-shadow: 0 0 20px rgba(70, 90, 130, 0.3), 0 0 45px rgba(70, 90, 130, 0.12);
            }
            50% { 
                background: rgba(50, 70, 110, 0.22);
                box-shadow: 0 0 35px rgba(70, 90, 130, 0.4), 0 0 70px rgba(70, 90, 130, 0.15);
            }
        }

        .image-container {
            position: relative;
            display: inline-block;
            max-width: none;
            width: 1650px;
            height: auto;
        }

        .clickable-area {
            position: absolute;
            background: transparent;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 4px;
            overflow: hidden;
        }

        /* Tooltip container - sits outside the overflow:hidden element */
        .tooltip {
            position: absolute;
            background: rgba(15, 20, 35, 0.92);
            color: #f0f4ff;
            font-family: Candara, 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.3px;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease-in-out;
            z-index: 1000;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 8px rgba(100, 130, 180, 0.1);
        }

        .tooltip.visible {
            opacity: 1;
        }

        /* Initial load animation - placeholder */
        a.clickable-area.animate-on-load {
            animation: none;
        }

        /* Ongoing breathing glow */
        a.clickable-area.pulse-ongoing {
            animation: breathe 3s ease-in-out infinite;
        }

        /* Shimmer light sweep */
        a.clickable-area.pulse-ongoing::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.5),
                rgba(255, 255, 255, 0.85),
                rgba(255, 255, 255, 0.5),
                transparent
            );
            animation: shimmer 4s ease-in-out infinite;
            animation-delay: var(--shimmer, 0s);
            pointer-events: none;
        }

        /* Stagger shimmer delays */
        a.clickable-area.pulse-ongoing:nth-child(1)::before { --shimmer: 0s; }
        a.clickable-area.pulse-ongoing:nth-child(2)::before { --shimmer: 0.5s; }
        a.clickable-area.pulse-ongoing:nth-child(3)::before { --shimmer: 1.0s; }
        a.clickable-area.pulse-ongoing:nth-child(4)::before { --shimmer: 1.5s; }
        a.clickable-area.pulse-ongoing:nth-child(5)::before { --shimmer: 2.0s; }
        a.clickable-area.pulse-ongoing:nth-child(6)::before { --shimmer: 2.5s; }
        a.clickable-area.pulse-ongoing:nth-child(7)::before { --shimmer: 3.0s; }
        a.clickable-area.pulse-ongoing:nth-child(8)::before { --shimmer: 3.5s; }
        a.clickable-area.pulse-ongoing:nth-child(9)::before { --shimmer: 0.3s; }
        a.clickable-area.pulse-ongoing:nth-child(13)::before { --shimmer: 1.3s; }
        a.clickable-area.pulse-ongoing:nth-child(15)::before { --shimmer: 2.3s; }

        /* Hover state */
        a.clickable-area:hover {
            animation: hoverGlow 1.5s ease-in-out infinite;
        }

        a.clickable-area:hover::before {
            animation: shimmer 2s ease-in-out infinite;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.5),
                rgba(255, 255, 255, 0.85),
                rgba(255, 255, 255, 0.5),
                transparent
            );
        }



        /* Specific styling for circular areas (LBP and Hi) on desktop */
        .clickable-area.circle-lbp,
        .clickable-area.circle-hi {
            border-radius: 50%;
        }

        .clickable-area.circle-lbp {
            width: 76px;
            height: 76px;
        }

        .clickable-area.circle-hi {
            width: 330px;
            height: 330px;
        }

        /* Desktop positioning and dimensions (default, above 768px) */

<body>

        <!-- Tooltip element -->
        <div class="tooltip" id="tooltip"></div>
    </div>

    <script>
        const tooltip = document.getElementById('tooltip');
        const areas = document.querySelectorAll('.clickable-area[data-title]');

        areas.forEach(area => {
            area.addEventListener('mouseenter', () => {
                const title = area.getAttribute('data-title');
                if (!title || title === 'Hi') return;
                tooltip.textContent = title;
                tooltip.classList.add('visible');

                const rect = area.getBoundingClientRect();
                const containerRect = area.closest('.image-container').getBoundingClientRect();
                const left = (rect.left - containerRect.left) + (rect.width / 2) - (tooltip.offsetWidth / 2);
                const top = (rect.top - containerRect.top) + rect.height + 8;
                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
            });

            area.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        });
    </script>
</body>
